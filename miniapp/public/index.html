<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Nila — Profile</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: #f6f5f1;
      --surface: #ffffff;
      --surface-alt: #edece4;
      --text: #20241f;
      --text-muted: #5c6459;
      --border: #dad6ca;
      --accent: #3d6b5c;
      --accent-strong: #234a3d;
      --accent-soft: #dceae3;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #141815;
        --surface: #1b211d;
        --surface-alt: #212722;
        --text: #e9ede6;
        --text-muted: #98a598;
        --border: #2e3630;
        --accent: #6fc2a9;
        --accent-strong: #8ed9c0;
        --accent-soft: #1f3a31;
      }
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      -webkit-text-size-adjust: 100%;
    }

    #app {
      max-width: 480px;
      margin: 0 auto;
      padding: 20px 16px calc(28px + env(safe-area-inset-bottom));
    }

    .state-message {
      text-align: center;
      color: var(--text-muted);
      padding: 48px 20px;
    }

    .profile-header { text-align: center; margin-bottom: 16px; }
    .avatar-circle {
      width: 68px; height: 68px;
      border-radius: 50%;
      background: var(--accent-soft);
      color: var(--accent-strong);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 10px;
      font-size: 26px;
      font-weight: 600;
    }
    .profile-name { font-size: 1.1rem; font-weight: 700; margin: 0; }
    .profile-subtitle { font-size: 13px; color: var(--text-muted); margin: 4px 0 0; }

    .stat-row {
      display: flex;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 12px 0;
      margin: 18px 0 18px;
    }
    .stat-row .s { flex: 1; text-align: center; }
    .stat-row .s strong { display: block; font-size: 16px; font-weight: 700; }
    .stat-row .s span { font-size: 10.5px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }

    .highlights { display: flex; justify-content: space-between; margin-bottom: 20px; gap: 4px; }
    .highlight-bubble {
      display: flex; flex-direction: column; align-items: center; gap: 5px;
      font-size: 10.5px; color: var(--text-muted);
      background: none; border: none; padding: 0;
      font-family: inherit;
    }
    .highlight-bubble .circle {
      width: 42px; height: 42px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
    }
    .highlight-bubble.done .circle { border-color: var(--accent); color: var(--accent-strong); }
    .highlight-bubble.now .circle { border-color: var(--accent); background: var(--accent-soft); color: var(--accent-strong); font-weight: 700; }

    .phase-section { margin-bottom: 12px; scroll-margin-top: 16px; }
    .fact-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 10px;
      background: var(--surface);
    }
    .fact-card .fact-head {
      font-size: 12.5px; font-weight: 700; color: var(--accent-strong);
      margin-bottom: 8px;
    }
    .fact-row { margin-bottom: 8px; font-size: 13px; }
    .fact-row:last-child { margin-bottom: 0; }
    .fact-row .fact-value { font-weight: 600; display: block; }
    .fact-row .fact-why { display: block; color: var(--text-muted); font-size: 11px; margin-top: 2px; }
  </style>
</head>
<body>
  <div id="app">
    <div class="state-message">Loading your profile…</div>
  </div>
  <script src="app.js"></script>
</body>
</html>
